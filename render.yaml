services:
  - type: web
    name: voting-system-api
    env: python
    rootDir: Backend
    buildCommand: ./build.sh
    startCommand: mkdir -p "$MEDIA_ROOT" && gunicorn votingproject.wsgi:application
    disk:
      name: voting-system-media
      mountPath: /var/data/media
      sizeGB: 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: votingproject.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: ALLOWED_HOSTS
        value: votingsystem-1-urbz.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://electionhub-xi.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://electionhub-xi.vercel.app
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: MEDIA_URL
        value: /media/
      - key: DATABASE_URL
        sync: false
