services:
  - type: web
    name: voting-system-api
    env: python
    rootDir: Backend
    buildCommand: ./build.sh
    startCommand: gunicorn votingproject.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DJANGO_SETTINGS_MODULE
        value: votingproject.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: DATABASE_SSL_REQUIRE
        value: true
      - key: ALLOWED_HOSTS
        value: voting-system-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
